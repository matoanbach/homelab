---
apiVersion: v1
baseDomain: internal.example.com

metadata:
  name: ocp

compute:
  - architecture: amd64
    hyperthreading: Enabled
    name: worker
    replicas: 0

controlPlane:
  architecture: amd64
  hyperthreading: Enabled
  name: master
  replicas: 3

networking:
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  machineNetwork:
    - cidr: 10.0.0.0/24
  networkType: OVNKubernetes
  serviceNetwork:
    - 172.30.0.0/16

platform:
  baremetal:
    apiVIPs:
      - "10.0.0.21"
    ingressVIPs:
      - "10.0.0.22"

pullSecret: ...
sshKey: ...